name: Sync seLe4n Data

on:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  # Allow triggering from the seLe4n repo via repository_dispatch
  repository_dispatch:
    types: [sele4n-release]
  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live data from seLe4n repository
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="hatter6822/seLe4n"
          RAW="https://raw.githubusercontent.com/${REPO}/main"

          # 1. Lean toolchain version
          LEAN_VERSION=$(curl -sf "${RAW}/lean-toolchain" | grep -oP '\d+\.\d+\.\d+' || echo "")
          echo "lean_version=${LEAN_VERSION}" >> "$GITHUB_OUTPUT"

          # 2. Project version from lakefile.toml
          VERSION=$(curl -sf "${RAW}/lakefile.toml" | grep -oP 'version\s*=\s*"\K[^"]+' || echo "")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # 3. Count modules, scripts, docs from the git tree
          TREE=$(gh api "repos/${REPO}/git/trees/main?recursive=1" --jq '.tree[] | select(.type == "blob") | .path')

          MODULES=$(echo "$TREE" | grep -cP '^SeLe4n/(?!Testing/).*\.lean$' || echo "0")
          SCRIPTS=$(echo "$TREE" | grep -cP '^scripts/.*\.sh$' || echo "0")
          DOCS=$(echo "$TREE" | grep -cP '^docs/.*\.(md|txt)$' || echo "0")
          BUILD_JOBS=$((MODULES * 2))
          echo "modules=${MODULES}" >> "$GITHUB_OUTPUT"
          echo "scripts=${SCRIPTS}" >> "$GITHUB_OUTPUT"
          echo "docs=${DOCS}" >> "$GITHUB_OUTPUT"
          echo "build_jobs=${BUILD_JOBS}" >> "$GITHUB_OUTPUT"

          # 4. Estimate lines from language stats
          LEAN_BYTES=$(gh api "repos/${REPO}/languages" --jq '.Lean // 0')
          if [ "$LEAN_BYTES" -gt 0 ] 2>/dev/null; then
            LINES=$((LEAN_BYTES / 38))
            LINES_FMT=$(printf "%'d" "$LINES")
            echo "lines=${LINES_FMT}" >> "$GITHUB_OUTPUT"
          else
            echo "lines=" >> "$GITHUB_OUTPUT"
          fi

          # 5. Count theorems across ALL Lean source files (dynamic enumeration)
          LEAN_FILES=$(echo "$TREE" | grep -P '^SeLe4n/.*\.lean$')
          THEOREMS=0
          for f in $LEAN_FILES; do
            COUNT=$(curl -sf "${RAW}/${f}" | grep -cP '^\s*(?:@\[.*?\]\s+|@[\w.]+\s+)*(?:private\s+|protected\s+)?(?:noncomputable\s+)?(?:theorem|lemma)\s' || true)
            THEOREMS=$((THEOREMS + COUNT))
          done
          echo "theorems=${THEOREMS}" >> "$GITHUB_OUTPUT"

          # Summary
          echo "### Fetched Data" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lean | ${LEAN_VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Theorems | ${THEOREMS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Modules | ${MODULES} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scripts | ${SCRIPTS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docs | ${DOCS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Jobs | ${BUILD_JOBS} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update static fallback values in index.html
        env:
          VERSION: ${{ steps.fetch.outputs.version }}
          LEAN_VERSION: ${{ steps.fetch.outputs.lean_version }}
          THEOREMS: ${{ steps.fetch.outputs.theorems }}
          MODULES: ${{ steps.fetch.outputs.modules }}
          SCRIPTS: ${{ steps.fetch.outputs.scripts }}
          DOCS: ${{ steps.fetch.outputs.docs }}
          BUILD_JOBS: ${{ steps.fetch.outputs.build_jobs }}
          LINES: ${{ steps.fetch.outputs.lines }}
        run: |
          set -euo pipefail
          FILE="index.html"

          if [ -z "$VERSION" ] || [ -z "$THEOREMS" ] || [ "$THEOREMS" -eq 0 ]; then
            echo "::warning::Incomplete data fetched, skipping update"
            exit 0
          fi

          # Helper: update data-live fallback values
          # Matches: data-live="key">OLD_VALUE< and replaces OLD_VALUE
          update_live() {
            local key="$1" value="$2"
            if [ -n "$value" ]; then
              sed -i "s|data-live=\"${key}\">[^<]*<|data-live=\"${key}\">${value}<|g" "$FILE"
            fi
          }

          update_live "version" "$VERSION"
          update_live "lean-version" "$LEAN_VERSION"
          update_live "theorems" "$THEOREMS"
          update_live "modules" "$MODULES"
          update_live "scripts" "$SCRIPTS"
          update_live "docs" "$DOCS"
          update_live "build-jobs" "$BUILD_JOBS"
          if [ -n "$LINES" ]; then
            update_live "lines" "$LINES"
          fi

          # Update meta description theorem counts
          sed -i "s|with [0-9,]* machine-checked theorems|with ${THEOREMS} machine-checked theorems|g" "$FILE"

          # Update JSON-LD version
          sed -i "s|\"version\": \"[^\"]*\"|\"version\": \"${VERSION}\"|g" "$FILE"

      - name: Update site-data.json
        env:
          VERSION: ${{ steps.fetch.outputs.version }}
          LEAN_VERSION: ${{ steps.fetch.outputs.lean_version }}
          THEOREMS: ${{ steps.fetch.outputs.theorems }}
          MODULES: ${{ steps.fetch.outputs.modules }}
          SCRIPTS: ${{ steps.fetch.outputs.scripts }}
          DOCS: ${{ steps.fetch.outputs.docs }}
          BUILD_JOBS: ${{ steps.fetch.outputs.build_jobs }}
          LINES: ${{ steps.fetch.outputs.lines }}
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('data/site-data.json', 'utf8'));
            if (process.env.VERSION) data.version = process.env.VERSION;
            if (process.env.LEAN_VERSION) data.leanVersion = process.env.LEAN_VERSION;
            if (process.env.THEOREMS) data.theorems = Number(process.env.THEOREMS);
            if (process.env.MODULES) data.modules = Number(process.env.MODULES);
            if (process.env.SCRIPTS) data.scripts = Number(process.env.SCRIPTS);
            if (process.env.DOCS) data.docs = Number(process.env.DOCS);
            if (process.env.BUILD_JOBS) data.buildJobs = Number(process.env.BUILD_JOBS);
            if (process.env.LINES) data.lines = process.env.LINES;
            data.generatedAt = new Date().toISOString();
            fs.writeFileSync('data/site-data.json', JSON.stringify(data, null, 2) + '\n');
          "

      - name: Check for changes and commit
        run: |
          if git diff --quiet index.html data/site-data.json; then
            echo "No changes detected — website is already in sync."
            exit 0
          fi

          echo "### Changes detected" >> "$GITHUB_STEP_SUMMARY"
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          git diff index.html >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/site-data.json
          git commit -m "sync: update static values from seLe4n v${{ steps.fetch.outputs.version }}

          Automated sync from GitHub Actions.
          Theorems: ${{ steps.fetch.outputs.theorems }}
          Modules: ${{ steps.fetch.outputs.modules }}
          Scripts: ${{ steps.fetch.outputs.scripts }}
          Docs: ${{ steps.fetch.outputs.docs }}"
          git push
