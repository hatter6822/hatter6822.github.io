name: Validate

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly link check — Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  html:
    name: HTML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: npx html-validate@latest index.html

  site-checks:
    name: Site Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run validation script
        run: bash scripts/validate.sh

  links:
    name: Link Check
    # Only run on schedule or manual dispatch to avoid flaky PR checks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 3
            --timeout 30
            --exclude-path .github
            index.html
          fail: true
